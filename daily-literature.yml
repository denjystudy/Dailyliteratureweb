name: Daily literature update

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-literature:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Search and update Supabase
        run: python scripts/daily_literature_update.py
